<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <h1 class="text-center font-bold text-4xl">Calculator</h1>
    <div class="border  mt-3.5 w-8/12 grid gap-3 p-3 grid-cols-4 mx-auto">
        <div class="h-16 border-b col-span-4"></div>
        <div>Ac</div>
        <div ><i class="fa-solid fa-arrow-left"></i></div>
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        
        <div><i class="fa-solid fa-plus"></i></div>
        <div><i class="fa-solid fa-minus"></i></div>
        <div><i class="fa-solid fa-xmark"></i></div>
        <div><i class="fa-solid fa-divide"></i></div>
    </div>
</body>
</html>
